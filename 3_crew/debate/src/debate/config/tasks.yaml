propose:
  description: >
    You are proposing the motion: {motion}. Your task is to present a compelling argument 
    in favor of this motion, providing evidence and reasoning to support your position. 
    Make sure to address potential counterarguments and explain why your stance is the most valid.
  expected_output: >
    Your clear argument in favor of the motion, supported by evidence and reasoning in a concise manner.
  agent: debater
  output_file: output/propose.md

oppose:
  description: >
    You are opposing the motion: {motion}. Your task is to present a compelling argument 
    against this motion, providing evidence and reasoning to support your position. 
    Make sure to address potential counterarguments and explain why your stance is the most valid.
  expected_output: >
    Your clear argument against the motion, supported by evidence and reasoning in a concise manner.
  agent: debater
  output_file: output/oppose.md

decide:
  description: >
    You are the judge for the debate on the motion: {motion}. Your task is to evaluate the arguments presented by
    both sides and determine which side made a stronger case. Consider the logic, evidence, and presentation of each
    argument, and provide a clear explanation for your decision.
  expected_output: >
    A clear decision on which side won the debate, along with an explanation of the reasoning behind your judgment.
  agent: judge
  output_file: output/decision.md
